    <link rel="canonical" href="https://blog.niazbinsiraj.com/">

    <!-- SEO: Homepage Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "Niaz Bin Siraj",
      "url": "https://blog.niazbinsiraj.com/",
      "description": "Competitive programming, mathematics, science, and software engineering — by Niaz Bin Siraj.",
      "inLanguage": ["en", "bn"],
      "author": {
        "@type": "Person",
        "name": "Niaz Bin Siraj",
        "url": "https://blog.niazbinsiraj.com/"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Niaz Bin Siraj",
      "url": "https://blog.niazbinsiraj.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://blog.niazbinsiraj.com/#search?query={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.google.com">
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="//www.google-analytics.com">
    <link rel="dns-prefetch" href="//img.youtube.com">

    <!-- FOUC-free Preference Loader — must be before CSS -->
    <script>
    (function() {
      try {
        var p = JSON.parse(localStorage.getItem('blog_reading_prefs') || '{}');
        var r = document.documentElement.style;
        var themes = {
          light:  ['#ffffff','#1a1a1a','#6b6b6b','#e5e5e5','#f7f7f7'],
          dark:   ['#0f0f0f','#e8e8e8','#999999','#2a2a2a','#1a1a1a'],
          sepia:  ['#f4efe6','#3b2f1e','#7a6b5a','#d9d0c3','#ebe4d8'],
          custom: [p.customBg||'#ffffff', p.customText||'#1a1a1a','#6b6b6b','#e5e5e5','#f7f7f7']
        };
        var t = themes[p.theme] || themes.light;
        r.setProperty('--color-bg', t[0]);
        r.setProperty('--color-text', t[1]);
        r.setProperty('--color-text-muted', t[2]);
        r.setProperty('--color-border', t[3]);
        r.setProperty('--color-surface', t[4]);
        if (p.fontFamily) r.setProperty('--font-body', {
          serif: "Georgia,'Times New Roman',serif",
          humanist: "'Literata','Charter',serif",
          mono: "'iA Writer Mono','Courier New',monospace",
          custom: p.customFont || 'system-ui'
        }[p.fontFamily] || 'system-ui,-apple-system,sans-serif');
        if (p.fontSize) r.setProperty('--font-size-base', p.fontSize + 'px');
        if (p.fontWeight) r.setProperty('--font-weight-body', p.fontWeight);
        if (p.contentWidth) r.setProperty('--content-width', p.contentWidth + 'px');
        if (p.lineHeight) r.setProperty('--line-height-body', p.lineHeight);
        if (p.wordSpacing !== undefined) r.setProperty('--word-spacing-body', p.wordSpacing + 'px');
        if (p.letterSpacing !== undefined) r.setProperty('--letter-spacing-body', p.letterSpacing + 'px');
        if (p.paragraphSpacing) r.setProperty('--paragraph-spacing', p.paragraphSpacing + 'em');
        document.documentElement.setAttribute('data-theme', p.theme || 'light');
      } catch(e) {}
    })();
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Reading Progress Bar (post pages only, injected by JS) -->

    <!-- Top Bar -->
    <header id="top-bar">
        <div class="top-bar-inner">
            <a href="#" class="blog-title" data-route="home">Niaz Bin Siraj</a>
            <nav class="desktop-nav">
                <a href="#" data-route="home">Home</a>
                <a href="#" data-route="posts">Posts</a>
                <a href="#" data-route="categories">Categories</a>
                <a href="#" data-route="tags">Tags</a>
                <a href="#" data-route="about">About</a>
            </nav>
            <div class="top-bar-actions">
                <button id="searchToggle" class="top-bar-btn" aria-label="Search">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
                <button id="prefsToggle" class="top-bar-btn" aria-label="Reading preferences">Aa</button>
                <button id="navToggle" class="top-bar-btn mobile-only" aria-label="Menu">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Search Bar (hidden by default, toggled) -->
        <div id="search-bar" class="search-bar hidden">
            <input type="text" id="searchInput" placeholder="Search posts..." aria-label="Search blog posts">
        </div>
    </header>

    <!-- Mobile Nav Drawer -->

        <a href="#" data-route="posts">All Posts</a>

    <!-- Layout Wrapper: Sidebar + Content -->

        <!-- Main Content Area -->
        <main id="content">

        </main>

        <!-- Right Sidebar (tags) -->
        <aside id="sidebar-right">
            <div class="sidebar-section">
                <h3 class="sidebar-heading">Tags</h3>
                <div id="sidebar-tags" class="sidebar-tag-cloud">
                    <!-- Populated dynamically by JS -->

    </div>

    <!-- Footer -->

        <div class="footer-inner">
            <span>&copy; 2025 Niaz Bin Siraj</span>
            <span class="footer-links">
                <a href="#" data-route="about">About</a>
                <a href="https://github.com/NiazBinSiraj" target="_blank" rel="noopener">GitHub</a>
                <a href="https://linkedin.com/in/niazbinsiraj" target="_blank" rel="noopener">LinkedIn</a>
            </span>
        </div>
    </footer>

    <!-- Scroll to Top Button -->
    <button id="scrollToTop" class="scroll-to-top" aria-label="Scroll to top">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>

</html>
